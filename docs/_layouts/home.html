<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ page.title | default: site.title }}</title>
    <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <div class="logo">
                <a href="{{ '/' | relative_url }}">{{ site.title }}</a>
            </div>
            <ul class="nav-links">
                <li><a href="{{ '/features.html' | relative_url }}">Features</a></li>
                <li><a href="{{ '/installation.html' | relative_url }}">Install</a></li>
                <li><a href="{{ '/customization.html' | relative_url }}">Customize</a></li>
                <li><a href="{{ '/troubleshooting.html' | relative_url }}">Help</a></li>
                <li><a href="https://github.com/{{ site.github_username }}/{{ site.github_repo }}" class="btn-github">GitHub</a></li>
            </ul>
        </div>
    </nav>

    <main class="main-content">
        {{ content }}
    </main>

    <footer class="footer">
        <div class="footer-content">
            <p>&copy; 2024 {{ site.title }}. Licensed under {{ site.license }}.</p>
            <p>
                <a href="https://github.com/{{ site.github_username }}/{{ site.github_repo }}">GitHub</a> •
                <a href="https://hyprland.org">Hyprland</a> •
                <a href="https://quickshell.outfoxxed.me">Quickshell</a>
            </p>
        </div>
    </footer>
</body>
</html>
