<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ page.title | default: site.title }}</title>
    <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
</head>
<body>
    <div class="layout-wrapper">
        <aside class="sidebar">
            <div class="sidebar-brand">
                <a href="{{ '/' | relative_url }}" class="brand-name">{{ site.title }}</a>
                <span class="brand-tag">docs</span>
            </div>

            <nav class="sidebar-nav">
                <a href="{{ '/' | relative_url }}" class="nav-home">Overview</a>

                <div class="nav-section">
                    <span class="nav-section-label">Getting Started</span>
                    <a href="{{ '/features.html' | relative_url }}">Features</a>
                    <a href="{{ '/installation.html' | relative_url }}">Installation</a>
                    <a href="{{ '/requirements.html' | relative_url }}">Requirements</a>
                </div>

                <div class="nav-section">
                    <span class="nav-section-label">Usage</span>
                    <a href="{{ '/keybinds.html' | relative_url }}">Keybinds</a>
                    <a href="{{ '/configuration.html' | relative_url }}">Configuration</a>
                </div>

                <div class="nav-section">
                    <span class="nav-section-label">Customization</span>
                    <a href="{{ '/customization.html' | relative_url }}">Overview</a>
                    <a href="{{ '/themes.html' | relative_url }}">Themes & Colors</a>
                </div>

                <div class="nav-section">
                    <span class="nav-section-label">Help</span>
                    <a href="{{ '/troubleshooting.html' | relative_url }}">Troubleshooting</a>
                    <a href="https://github.com/{{ site.github_username }}/{{ site.github_repo }}" target="_blank" class="nav-external">
                        GitHub
                        <svg width="10" height="10" viewBox="0 0 12 12" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M2 10L10 2M10 2H4M10 2V8" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
                    </a>
                </div>
            </nav>

            <div class="sidebar-footer">
                <span>GPLv3</span>
                <span>·</span>
                <a href="https://github.com/{{ site.github_username }}/{{ site.github_repo }}" target="_blank">quirijndubois</a>
            </div>
        </aside>

        <main class="main-content">
            {{ content }}
        </main>
    </div>
</body>
</html>
